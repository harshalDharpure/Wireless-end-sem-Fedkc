project:
  name: FedKDC-CL-smoke
  seed: 42
  device: cpu
  num_workers: 0
  results_dir: results

fl:
  num_clients: 2
  client_fraction: 1.0
  num_rounds: 1
  eval_every: 1

client:
  batch_size: 32
  local_epochs: 1
  lr: 0.01
  momentum: 0.9
  weight_decay: 0.0
  max_grad_norm: 0.0

data:
  dataset: MNIST
  iid: true
  dirichlet_alpha: 1.0
  val_ratio: 0.1

continual:
  enabled: true
  tasks:
    - name: mnist_0_4
      dataset: MNIST
      class_subset: [0, 1, 2, 3, 4]
      rounds: 1

fedavg:
  strategy: FedAvg

fedkdc_cl:
  strategy: FedKDC-CL
  num_clusters: 1
  kd:
    enabled: true
    kd_epochs: 1
    kd_weight: 1.0
    ce_weight: 1.0
    base_temperature: 2.0
    target_entropy: 1.5
    min_temperature: 1.0
    max_temperature: 6.0
  drift_guard:
    enabled: true
    promote_every: 1
