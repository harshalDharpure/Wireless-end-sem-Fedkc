seed: 42

methods: [fedavg, flwf2]
datasets: [mnist, fmnist, cifar10]
num_clients: [10, 50, 100]

partitions:
  - name: iid
    dirichlet_alpha: null
  - name: dirichlet
    dirichlet_alpha: 0.01
  - name: dirichlet
    dirichlet_alpha: 0.1
  - name: dirichlet
    dirichlet_alpha: 0.5
  - name: dirichlet
    dirichlet_alpha: 1.0

federated:
  fraction_fit: 0.5

training:
  local_epochs: 5
  batch_size: 32
  optimizer:
    name: sgd
    lr: 0.01
    momentum: 0.9

continual:
  # You can increase these; defaults kept moderate for runtime.
  rounds_task1: 10
  rounds_task2: 10

data:
  data_dir: ./data

resources:
  client:
    num_cpus: 1
    num_gpus: 1.0

output:
  results_dir: ./results
  runs_subdir: runs
